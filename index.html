<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>席替えガチャ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
<h1>席替えガチャ</h1>
<p class="subtitle">ボタンを押して運命の席を決めよう！</p>
 
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('setup')">⚙ 設定</button>
  <button class="tab-btn" onclick="showTab('lottery')">🎲 席替え開始</button>
</div>
 
<!-- ===== SETUP ===== -->
<div id="setup-tab" class="setup-panel">
  <div class="setup-section">
    <h2>📐 座席レイアウト</h2>
    <div class="form-row">
      <label>列数（横）</label>
      <input type="number" id="cols" value="6" min="1" max="12" onchange="generatePreview()">
      <label>行数（縦）</label>
      <input type="number" id="rows" value="7" min="1" max="12" onchange="generatePreview()">
      <button class="btn btn-primary btn-small" onclick="generatePreview()">生成</button>
    </div>
    <p class="hint">※ クリックで席を無効化できます（使わない席をクリック）</p>
    <div class="teacher-desk">黒板 ／ 教卓</div>
    <div id="seat-preview" class="seat-preview"></div>
    <p id="active-count" class="student-count"></p>
  </div>
 
  <div class="setup-section">
    <h2>📋 生徒名簿（CSV）</h2>
    <div class="csv-area" id="csv-drop" onclick="document.getElementById('csv-file').click()">
      📁 CSVファイルをドラッグ＆ドロップ または クリックして選択
    </div>
    <input type="file" id="csv-file" accept=".csv,.txt" onchange="handleCSV(this)">
    <p class="hint">1列目を名前として読み込みます（ヘッダー行があれば自動スキップ）</p>
    <p id="csv-status" class="student-count"></p>
    <div id="student-preview" style="margin-top:0.5rem; font-size:0.85rem; color:var(--text-dim); max-height:120px; overflow-y:auto;"></div>
  </div>
 
  <div style="text-align:center; margin-top:1rem; margin-bottom:2rem;">
    <button class="btn btn-primary" style="font-size:1.1rem; padding:0.8rem 3rem;" onclick="startLottery()">🎲 席替え開始！</button>
  </div>
</div>
 
<!-- ===== LOTTERY ===== -->
<div id="lottery-tab" class="lottery-panel" style="display:none;">
  <div class="seat-map-container">
    <div class="teacher-desk">黒板 ／ 教卓</div>
    <div id="seat-map" class="seat-map"></div>
    <div class="progress-bar"><div id="progress" class="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="control-area">
    <div class="mode-toggle">
      <button id="mode-fancy" class="active" onclick="setMode('fancy')">🎰 派手モード</button>
      <button id="mode-simple" onclick="setMode('simple')">⚡ シンプル</button>
    </div>
    <div class="current-student">
      <div class="label">次の挑戦者</div>
      <div class="name" id="cur-name">−</div>
      <div class="number" id="cur-number"></div>
    </div>
    <div class="slot-display">
      <div class="slot-label">あなたの席は…</div>
      <div class="slot-number" id="slot-num">？</div>
    </div>
    <button class="big-button" id="go-btn" onclick="drawSeat()">🎲 一人ずつ席を決める！</button>
    <button class="big-button" id="bulk-btn" onclick="bulkAssign()" style="background:linear-gradient(135deg, var(--accent2), #7c3aed); margin-top:0.5rem;">⚡ 一括で全員決定！</button>
    <button class="btn btn-secondary btn-small" onclick="skipStudent()" id="skip-btn">▶ スキップ（欠席）</button>
    <div class="queue-list">
      <h4>📝 残りの生徒</h4>
      <div id="queue"></div>
    </div>
  </div>
</div>
 
<script src="script.js"></script>
</body>
</html>
